name: Build APKs

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./TuneUp-Android-Project/android-project/gradlew
        shell: bash

      - name: Build Debug APK
        working-directory: ./TuneUp-Android-Project/android-project
        run: ./gradlew clean assembleDebug

      - name: Build Release APK
        working-directory: ./TuneUp-Android-Project/android-project
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: TuneUp-Android-Project/android-project/app/build/outputs/apk/debug/

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-apk
          path: TuneUp-Android-Project/android-project/app/build/outputs/apk/release/
