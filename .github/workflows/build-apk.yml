name: Build APKs

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./TuneUp-Android-Project/android-project/gradlew

      - name: Build Debug APK
        run: |
          cd ./TuneUp-Android-Project/android-project
          ./gradlew clean
          ./gradlew assembleDebug -v

      - name: Build Release APK
        run: |
          cd ./TuneUp-Android-Project/android-project
          ./gradlew assembleRelease -v

      - name: Check build outputs
        run: |
          find ./TuneUp-Android-Project/android-project -name "*.apk" -type f

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-builds
          path: |
            TuneUp-Android-Project/android-project/app/build/outputs/apk/debug/*.apk
            TuneUp-Android-Project/android-project/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
