name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix gradlew permissions
        run: |
          cd TuneUp-Android-Project/android-project
          chmod +x gradlew
          dos2unix gradlew || true
          head -5 gradlew

      - name: Create gradle.properties
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m" > TuneUp-Android-Project/android-project/gradle.properties

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > TuneUp-Android-Project/android-project/local.properties

      - name: Build Debug
        run: |
          cd TuneUp-Android-Project/android-project
          ./gradlew clean assembleDebug

      - name: Build Release
        run: |
          cd TuneUp-Android-Project/android-project
          ./gradlew assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: APKs
          path: |
            TuneUp-Android-Project/android-project/app/build/outputs/apk/debug/*.apk
            TuneUp-Android-Project/android-project/app/build/outputs/apk/release/*.apk
