name: Build APKs

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure SDK path
        run: |
          cd TuneUp-Android-Project/android-project
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant execute permission
        run: chmod +x TuneUp-Android-Project/android-project/gradlew

      - name: Gradle Debug Build
        run: |
          cd TuneUp-Android-Project/android-project
          ./gradlew --version
          ./gradlew assembleDebug -v 2>&1 | tail -100

      - name: Check APK exists
        run: find TuneUp-Android-Project -name "*.apk" -o -name "build" -type d
