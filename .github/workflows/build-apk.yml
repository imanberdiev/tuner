name: Build APKs

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          cd TuneUp-Android-Project/android-project
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Make gradlew executable
        run: chmod +x ./TuneUp-Android-Project/android-project/gradlew

      - name: Build Debug APK
        run: |
          cd ./TuneUp-Android-Project/android-project
          ./gradlew clean assembleDebug --stacktrace

      - name: Build Release APK
        run: |
          cd ./TuneUp-Android-Project/android-project
          ./gradlew assembleRelease --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk-builds
          path: |
            TuneUp-Android-Project/android-project/app/build/outputs/apk/debug/*.apk
            TuneUp-Android-Project/android-project/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
