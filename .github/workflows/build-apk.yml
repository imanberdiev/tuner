name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          cd TuneUp-Android-Project/android-project
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant execute permission to gradlew
        run: chmod +x TuneUp-Android-Project/android-project/gradlew

      - name: Build Debug APK
        run: |
          cd TuneUp-Android-Project/android-project
          ./gradlew clean assembleDebug --stacktrace

      - name: Build Release APK
        run: |
          cd TuneUp-Android-Project/android-project
          ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: TuneUp-Android-Project/android-project/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release
          path: TuneUp-Android-Project/android-project/app/build/outputs/apk/release/app-release.apk
