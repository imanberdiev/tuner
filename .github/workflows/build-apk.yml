name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete corrupted gradlew
        run: rm -f TuneUp-Android-Project/android-project/gradlew TuneUp-Android-Project/android-project/gradlew.bat

      - name: Download fresh Gradle wrapper
        run: |
          cd TuneUp-Android-Project/android-project
          wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.properties -O gradle/wrapper/gradle-wrapper.properties 2>/dev/null || true
          gradle wrapper --gradle-version 8.5 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x TuneUp-Android-Project/android-project/gradlew

      - name: Create gradle.properties
        run: |
          cd TuneUp-Android-Project/android-project
          cat >> gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx2048m
android.useAndroidX=true
android.enableJetifier=true
EOF

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > TuneUp-Android-Project/android-project/local.properties

      - name: Build Debug APK
        run: |
          cd TuneUp-Android-Project/android-project
          ./gradlew clean assembleDebug

      - name: Build Release APK
        run: |
          cd TuneUp-Android-Project/android-project
          ./gradlew assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: APKs
          path: |
            TuneUp-Android-Project/android-project/app/build/outputs/apk/debug/*.apk
            TuneUp-Android-Project/android-project/app/build/outputs/apk/release/*.apk
