<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TuneUp — Тюнер</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --card: #1a1a2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --glow: rgba(124,58,237,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 60% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(6,182,212,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 430px; margin: 0 auto; padding: 20px 16px 40px; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0 24px;
  }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    box-shadow: 0 0 0 3px rgba(100,116,139,0.2);
    transition: all 0.3s;
  }
  .status-dot.active { background: var(--green); box-shadow: 0 0 0 4px rgba(16,185,129,0.2); }

  /* INSTRUMENT SELECTOR */
  .instrument-tabs {
    display: flex; gap: 8px; margin-bottom: 24px;
  }
  .tab {
    flex: 1; padding: 12px 8px; border-radius: 14px;
    border: 2px solid transparent;
    background: var(--card);
    color: var(--muted); font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.25s; display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .tab .tab-icon { font-size: 22px; }
  .tab.active {
    border-color: var(--accent);
    background: rgba(124,58,237,0.15);
    color: var(--text);
    box-shadow: 0 0 20px rgba(124,58,237,0.2);
  }
  .tab:active { transform: scale(0.96); }

  /* TUNING MODES */
  .tuning-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .tuning-modes { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
  .mode-btn {
    padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--card);
    background: transparent; color: var(--muted); font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .mode-btn.active {
    border-color: var(--accent2); color: var(--accent2);
    background: rgba(6,182,212,0.1);
  }
  .mode-btn:active { transform: scale(0.95); }

  /* MAIN TUNER CIRCLE */
  .tuner-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }

  .tuner-ring-wrap {
    position: relative; width: 240px; height: 240px; margin-bottom: 20px;
  }

  .tuner-ring-wrap svg { position: absolute; top: 0; left: 0; }

  .tuner-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }

  .note-name {
    font-size: 72px; font-weight: 800; line-height: 1;
    letter-spacing: -4px; transition: all 0.2s;
    font-family: 'Space Mono', monospace;
  }
  .note-octave { font-size: 22px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: -4px; }
  .freq-display { font-size: 13px; color: var(--muted); margin-top: 6px; font-family: 'Space Mono', monospace; }

  /* NEEDLE METER */
  .meter-bar {
    width: 100%; max-width: 300px; position: relative;
    background: var(--card); border-radius: 20px; height: 12px; overflow: hidden;
    margin-bottom: 8px;
  }
  .meter-fill {
    position: absolute; top: 0; bottom: 0; width: 4px; border-radius: 4px;
    background: var(--accent); left: 50%; transform: translateX(-50%);
    transition: left 0.15s ease-out, background 0.2s;
    box-shadow: 0 0 8px currentColor;
  }
  .meter-center { position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(255,255,255,0.1); }
  .meter-labels {
    display: flex; justify-content: space-between; width: 100%; max-width: 300px;
    font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace;
  }
  .cents-display {
    font-family: 'Space Mono', monospace; font-size: 14px;
    margin-top: 4px; transition: color 0.2s;
  }

  /* TUNER BUTTON */
  .tune-btn {
    width: 100%; padding: 18px; border-radius: 18px; border: none;
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
    cursor: pointer; transition: all 0.25s; letter-spacing: 0.5px;
    margin-bottom: 24px;
    background: linear-gradient(135deg, var(--accent), #9333ea);
    color: white;
    box-shadow: 0 8px 32px rgba(124,58,237,0.4);
    position: relative; overflow: hidden;
  }
  .tune-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .tune-btn:hover::before { opacity: 1; }
  .tune-btn:active { transform: scale(0.97); }
  .tune-btn.listening {
    background: linear-gradient(135deg, #dc2626, #991b1b);
    box-shadow: 0 8px 32px rgba(239,68,68,0.4);
    animation: pulse-btn 1.5s infinite;
  }
  @keyframes pulse-btn {
    0%,100% { box-shadow: 0 8px 32px rgba(239,68,68,0.4); }
    50% { box-shadow: 0 8px 48px rgba(239,68,68,0.7); }
  }

  /* STRING GRID */
  .strings-section { margin-bottom: 24px; }
  .section-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .strings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .string-card {
    background: var(--card); border-radius: 16px; padding: 14px 16px;
    border: 2px solid transparent; transition: all 0.25s; cursor: pointer;
    display: flex; align-items: center; gap: 12px;
  }
  .string-card:active { transform: scale(0.97); }
  .string-card.selected {
    border-color: var(--accent);
    background: rgba(124,58,237,0.12);
  }
  .string-card.in-tune {
    border-color: var(--green);
    background: rgba(16,185,129,0.1);
  }
  .string-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--surface); display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: var(--muted);
    flex-shrink: 0;
  }
  .string-card.selected .string-num { background: var(--accent); color: white; }
  .string-info { flex: 1; }
  .string-note-name { font-size: 20px; font-weight: 800; font-family: 'Space Mono', monospace; line-height: 1; }
  .string-freq { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .string-status { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: all 0.2s; }
  .string-card.in-tune .string-status { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* REFERENCE PITCH */
  .reference-section {
    background: var(--card); border-radius: 18px; padding: 16px;
    margin-bottom: 24px;
  }
  .ref-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .ref-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .ref-value { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; color: var(--accent2); }
  input[type=range] {
    width: 100%; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--range-pct, 50%), var(--surface) var(--range-pct, 50%));
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
    background: white; box-shadow: 0 0 0 3px var(--accent), 0 4px 12px rgba(0,0,0,0.3);
    cursor: pointer; transition: transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }

  /* CHROMATIC DISPLAY */
  .chromatic-section {
    background: var(--card); border-radius: 18px; padding: 16px; margin-bottom: 24px;
  }
  .chromatic-notes {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px;
  }
  .chroma-note {
    width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
    background: var(--surface); color: var(--muted); transition: all 0.15s;
    border: 1.5px solid transparent;
  }
  .chroma-note.detected {
    background: rgba(124,58,237,0.2); border-color: var(--accent); color: var(--text);
    box-shadow: 0 0 12px rgba(124,58,237,0.3);
  }

  /* VOLUME METER */
  .vol-section { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .vol-label { font-size: 11px; color: var(--muted); white-space: nowrap; font-family: 'Space Mono', monospace; }
  .vol-bar { flex: 1; height: 6px; background: var(--card); border-radius: 3px; overflow: hidden; }
  .vol-fill { height: 100%; width: 0%; border-radius: 3px; transition: width 0.1s; background: linear-gradient(to right, var(--accent2), var(--accent)); }

  /* ANIMATIONS */
  @keyframes spin-ring { to { transform: rotate(360deg); } }

  .in-tune-flash { animation: in-tune-glow 0.5s ease-out; }
  @keyframes in-tune-glow {
    0% { color: var(--text); }
    50% { color: var(--green); text-shadow: 0 0 20px var(--green); }
    100% { color: var(--text); }
  }

  .in-tune-badge {
    background: rgba(16,185,129,0.15); border: 1.5px solid var(--green);
    color: var(--green); border-radius: 20px; padding: 4px 12px;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    opacity: 0; transition: opacity 0.3s; margin-top: 6px;
    font-family: 'Space Mono', monospace;
  }
  .in-tune-badge.visible { opacity: 1; }

  /* FOOTER */
  .footer { text-align: center; font-size: 11px; color: var(--muted); padding-top: 10px; }

  /* NO MIC */
  .no-mic-msg {
    background: rgba(239,68,68,0.1); border: 1.5px solid rgba(239,68,68,0.3);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
    font-size: 13px; color: #fca5a5; display: none;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Tune<span>Up</span></div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- INSTRUMENT TABS -->
  <div class="instrument-tabs">
    <button class="tab active" onclick="selectInstrument('guitar')" id="tab-guitar">
      <span class="tab-icon">🎸</span>
      Гитара
    </button>
    <button class="tab" onclick="selectInstrument('ukulele')" id="tab-ukulele">
      <span class="tab-icon">🪕</span>
      Укулеле
    </button>
    <button class="tab" onclick="selectInstrument('bass')" id="tab-bass">
      <span class="tab-icon">🎵</span>
      Бас
    </button>
  </div>

  <!-- TUNING MODES -->
  <div class="tuning-label">Строй</div>
  <div class="tuning-modes" id="tuningModes"></div>

  <!-- NO MIC MESSAGE -->
  <div class="no-mic-msg" id="noMicMsg">⚠️ Нет доступа к микрофону. Разрешите доступ и попробуйте снова.</div>

  <!-- MAIN TUNER -->
  <div class="tuner-section">
    <div class="tuner-ring-wrap">
      <svg width="240" height="240" viewBox="0 0 240 240">
        <!-- Background ring -->
        <circle cx="120" cy="120" r="108" fill="none" stroke="#1a1a2e" stroke-width="12"/>
        <!-- Color arc segments -->
        <circle cx="120" cy="120" r="108" fill="none" stroke="#ef4444" stroke-width="12"
                stroke-dasharray="56 624" stroke-dashoffset="0" stroke-linecap="round" opacity="0.5"
                transform="rotate(-90 120 120)"/>
        <circle cx="120" cy="120" r="108" fill="none" stroke="#10b981" stroke-width="12"
                stroke-dasharray="56 624" stroke-dashoffset="-284" stroke-linecap="round" opacity="0.5"
                transform="rotate(-90 120 120)"/>
        <circle cx="120" cy="120" r="108" fill="none" stroke="#ef4444" stroke-width="12"
                stroke-dasharray="56 624" stroke-dashoffset="-568" stroke-linecap="round" opacity="0.5"
                transform="rotate(-90 120 120)"/>
        <!-- Tick marks -->
        <g id="tickMarks"></g>
        <!-- Needle -->
        <line id="needle" x1="120" y1="120" x2="120" y2="24"
              stroke="#7c3aed" stroke-width="3" stroke-linecap="round"
              transform="rotate(0 120 120)"
              style="transition: transform 0.15s ease-out;"/>
        <circle cx="120" cy="120" r="6" fill="#7c3aed"/>
        <!-- Animated ring when listening -->
        <circle id="listeningRing" cx="120" cy="120" r="114" fill="none" stroke="rgba(124,58,237,0.3)" stroke-width="2" stroke-dasharray="8 8" opacity="0">
          <animateTransform attributeName="transform" type="rotate" from="0 120 120" to="360 120 120" dur="4s" repeatCount="indefinite"/>
        </circle>
      </svg>
      <div class="tuner-center">
        <div class="note-name" id="noteName">—</div>
        <div class="note-octave" id="noteOctave"></div>
        <div class="freq-display" id="freqDisplay">— Hz</div>
      </div>
    </div>

    <!-- METER -->
    <div class="meter-bar">
      <div class="meter-center"></div>
      <div class="meter-fill" id="meterFill"></div>
    </div>
    <div class="meter-labels">
      <span>-50¢</span><span>-25¢</span><span>0</span><span>+25¢</span><span>+50¢</span>
    </div>
    <div class="cents-display" id="centsDisplay">— ¢</div>
    <div class="in-tune-badge" id="inTuneBadge">✓ В СТРОЕ</div>
  </div>

  <!-- VOLUME -->
  <div class="vol-section">
    <span class="vol-label">🎤 VOL</span>
    <div class="vol-bar"><div class="vol-fill" id="volFill"></div></div>
  </div>

  <!-- TUNE BUTTON -->
  <button class="tune-btn" id="tuneBtn" onclick="toggleTuner()">
    🎵 Начать настройку
  </button>

  <!-- STRINGS -->
  <div class="strings-section">
    <div class="section-title">Струны</div>
    <div class="strings-grid" id="stringsGrid"></div>
  </div>

  <!-- CHROMATIC -->
  <div class="chromatic-section">
    <div class="section-title">Хроматический определитель</div>
    <div class="chromatic-notes" id="chromaticNotes"></div>
  </div>

  <!-- REFERENCE -->
  <div class="reference-section">
    <div class="ref-header">
      <span class="ref-label">Эталонный тон (A4)</span>
      <span class="ref-value" id="refValue">440 Hz</span>
    </div>
    <input type="range" id="refSlider" min="430" max="450" value="440"
           oninput="updateReference(this.value)" step="0.5">
  </div>

  <div class="footer">TuneUp v1.0 • Хроматический тюнер</div>
</div>

<script>
// ====== DATA ======
const INSTRUMENTS = {
  guitar: {
    name: 'Гитара',
    tunings: {
      'Стандарт': [{note:'E',oct:2,freq:82.41},{note:'A',oct:2,freq:110.0},{note:'D',oct:3,freq:146.83},{note:'G',oct:3,freq:196.00},{note:'B',oct:3,freq:246.94},{note:'E',oct:4,freq:329.63}],
      'Drop D':   [{note:'D',oct:2,freq:73.42},{note:'A',oct:2,freq:110.0},{note:'D',oct:3,freq:146.83},{note:'G',oct:3,freq:196.00},{note:'B',oct:3,freq:246.94},{note:'E',oct:4,freq:329.63}],
      'Open G':   [{note:'D',oct:2,freq:73.42},{note:'G',oct:2,freq:98.00},{note:'D',oct:3,freq:146.83},{note:'G',oct:3,freq:196.00},{note:'B',oct:3,freq:246.94},{note:'D',oct:4,freq:293.66}],
      'DADGAD':   [{note:'D',oct:2,freq:73.42},{note:'A',oct:2,freq:110.0},{note:'D',oct:3,freq:146.83},{note:'G',oct:3,freq:196.00},{note:'A',oct:3,freq:220.0},{note:'D',oct:4,freq:293.66}],
      'Half ↓':   [{note:'Eb',oct:2,freq:77.78},{note:'Ab',oct:2,freq:103.83},{note:'Db',oct:3,freq:138.59},{note:'Gb',oct:3,freq:185.00},{note:'Bb',oct:3,freq:233.08},{note:'Eb',oct:4,freq:311.13}],
    }
  },
  ukulele: {
    name: 'Укулеле',
    tunings: {
      'Стандарт': [{note:'G',oct:4,freq:392.00},{note:'C',oct:4,freq:261.63},{note:'E',oct:4,freq:329.63},{note:'A',oct:4,freq:440.00}],
      'Low G':    [{note:'G',oct:3,freq:196.00},{note:'C',oct:4,freq:261.63},{note:'E',oct:4,freq:329.63},{note:'A',oct:4,freq:440.00}],
      'Баритон':  [{note:'D',oct:3,freq:146.83},{note:'G',oct:3,freq:196.00},{note:'B',oct:3,freq:246.94},{note:'E',oct:4,freq:329.63}],
      'D строй':  [{note:'A',oct:4,freq:440.00},{note:'D',oct:4,freq:293.66},{note:'F#',oct:4,freq:369.99},{note:'B',oct:4,freq:493.88}],
    }
  },
  bass: {
    name: 'Бас',
    tunings: {
      'Стандарт': [{note:'E',oct:1,freq:41.20},{note:'A',oct:1,freq:55.00},{note:'D',oct:2,freq:73.42},{note:'G',oct:2,freq:98.00}],
      '5 струн':  [{note:'B',oct:0,freq:30.87},{note:'E',oct:1,freq:41.20},{note:'A',oct:1,freq:55.00},{note:'D',oct:2,freq:73.42},{note:'G',oct:2,freq:98.00}],
      'Drop D':   [{note:'D',oct:1,freq:36.71},{note:'A',oct:1,freq:55.00},{note:'D',oct:2,freq:73.42},{note:'G',oct:2,freq:98.00}],
    }
  }
};

const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const A4 = 440;
let referenceA4 = 440;

// ====== STATE ======
let currentInstrument = 'guitar';
let currentTuning = 'Стандарт';
let selectedString = 0;
let isListening = false;
let audioCtx = null;
let analyser = null;
let micStream = null;
let animFrame = null;

// ====== INIT ======
function init() {
  drawTicks();
  renderTuningModes();
  renderStrings();
  renderChromatic();
  updateSliderStyle();
}

function drawTicks() {
  const g = document.getElementById('tickMarks');
  for (let i = -5; i <= 5; i++) {
    const angle = i * 18; // degrees
    const rad = (angle - 90) * Math.PI / 180;
    const r1 = i === 0 ? 96 : 100, r2 = 106;
    const x1 = 120 + r1 * Math.cos(rad), y1 = 120 + r1 * Math.sin(rad);
    const x2 = 120 + r2 * Math.cos(rad), y2 = 120 + r2 * Math.sin(rad);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', i === 0 ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.15)');
    line.setAttribute('stroke-width', i === 0 ? '2' : '1');
    g.appendChild(line);
  }
}

// ====== INSTRUMENT SELECT ======
function selectInstrument(instr) {
  currentInstrument = instr;
  currentTuning = Object.keys(INSTRUMENTS[instr].tunings)[0];
  selectedString = 0;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + instr).classList.add('active');
  renderTuningModes();
  renderStrings();
  resetDisplay();
}

function renderTuningModes() {
  const c = document.getElementById('tuningModes');
  const tunings = INSTRUMENTS[currentInstrument].tunings;
  c.innerHTML = Object.keys(tunings).map(name =>
    `<button class="mode-btn ${name === currentTuning ? 'active' : ''}" onclick="selectTuning('${name}')">${name}</button>`
  ).join('');
}

function selectTuning(name) {
  currentTuning = name;
  selectedString = 0;
  renderTuningModes();
  renderStrings();
  resetDisplay();
}

// ====== STRINGS ======
function renderStrings() {
  const strings = INSTRUMENTS[currentInstrument].tunings[currentTuning];
  const grid = document.getElementById('stringsGrid');
  grid.innerHTML = strings.map((s, i) =>
    `<div class="string-card ${i === selectedString ? 'selected' : ''}" id="str-${i}" onclick="selectString(${i})">
      <div class="string-num">${i + 1}</div>
      <div class="string-info">
        <div class="string-note-name">${s.note}</div>
        <div class="string-freq">${s.freq.toFixed(1)} Hz</div>
      </div>
      <div class="string-status" id="strStatus-${i}"></div>
    </div>`
  ).join('');
}

function selectString(i) {
  selectedString = i;
  renderStrings();
}

// ====== CHROMATIC ======
function renderChromatic() {
  const c = document.getElementById('chromaticNotes');
  c.innerHTML = CHROMATIC.map(n =>
    `<div class="chroma-note" id="chroma-${n.replace('#','s')}">${n}</div>`
  ).join('');
}

function highlightChromatic(note) {
  document.querySelectorAll('.chroma-note').forEach(el => el.classList.remove('detected'));
  if (note) {
    const id = 'chroma-' + note.replace('#','s');
    const el = document.getElementById(id);
    if (el) el.classList.add('detected');
  }
}

// ====== REFERENCE PITCH ======
function updateReference(val) {
  referenceA4 = parseFloat(val);
  document.getElementById('refValue').textContent = referenceA4.toFixed(1) + ' Hz';
  updateSliderStyle();
}
function updateSliderStyle() {
  const s = document.getElementById('refSlider');
  const pct = ((s.value - s.min) / (s.max - s.min) * 100).toFixed(1);
  s.style.setProperty('--range-pct', pct + '%');
}

// ====== TUNER LOGIC ======
function toggleTuner() {
  if (isListening) stopTuner();
  else startTuner();
}

async function startTuner() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    micStream = stream;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 8192;
    analyser.smoothingTimeConstant = 0.8;
    const src = audioCtx.createMediaStreamSource(stream);
    src.connect(analyser);
    isListening = true;
    document.getElementById('tuneBtn').textContent = '⏹ Остановить';
    document.getElementById('tuneBtn').classList.add('listening');
    document.getElementById('statusDot').classList.add('active');
    document.getElementById('listeningRing').setAttribute('opacity', '1');
    document.getElementById('noMicMsg').style.display = 'none';
    detectPitch();
  } catch(e) {
    document.getElementById('noMicMsg').style.display = 'block';
    console.error(e);
  }
}

function stopTuner() {
  isListening = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  document.getElementById('tuneBtn').textContent = '🎵 Начать настройку';
  document.getElementById('tuneBtn').classList.remove('listening');
  document.getElementById('statusDot').classList.remove('active');
  document.getElementById('listeningRing').setAttribute('opacity', '0');
  resetDisplay();
}

function detectPitch() {
  if (!isListening) return;
  const bufLen = analyser.frequencyBinCount;
  const buf = new Float32Array(bufLen);
  analyser.getFloatTimeDomainData(buf);

  // Volume
  let rms = 0;
  for (let i = 0; i < bufLen; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / bufLen);
  const volPct = Math.min(100, rms * 400);
  document.getElementById('volFill').style.width = volPct + '%';

  if (rms > 0.01) {
    const freq = autoCorrelate(buf, audioCtx.sampleRate);
    if (freq > 0) updateTunerDisplay(freq);
  } else {
    // silence
    document.getElementById('noteName').textContent = '—';
    document.getElementById('noteOctave').textContent = '';
    document.getElementById('freqDisplay').textContent = '— Hz';
    document.getElementById('centsDisplay').textContent = '— ¢';
    document.getElementById('centsDisplay').style.color = 'var(--muted)';
    setNeedle(0);
    setMeter(0);
    highlightChromatic(null);
  }
  animFrame = requestAnimationFrame(detectPitch);
}

function autoCorrelate(buf, sampleRate) {
  // Find fundamental frequency via autocorrelation
  let SIZE = buf.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.01) return -1;

  let r1 = 0, r2 = SIZE - 1;
  for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < 0.2) { r1 = i; break; }
  for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < 0.2) { r2 = SIZE - i; break; }
  buf = buf.slice(r1, r2);
  SIZE = buf.length;

  const c = new Array(SIZE).fill(0);
  for (let i = 0; i < SIZE; i++)
    for (let j = 0; j < SIZE - i; j++) c[i] += buf[j] * buf[j + i];

  let d = 0;
  while (c[d] > c[d + 1]) d++;
  let maxval = -1, maxpos = -1;
  for (let i = d; i < SIZE; i++) if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
  let T0 = maxpos;

  const x1 = c[T0-1], x2 = c[T0], x3 = c[T0+1];
  const a = (x1 + x3 - 2 * x2) / 2;
  const b = (x3 - x1) / 2;
  if (a) T0 = T0 - b / (2 * a);
  return sampleRate / T0;
}

function freqToNote(freq) {
  const semitones = 12 * Math.log2(freq / (referenceA4 / 2) * (referenceA4 / 440));
  const midi = Math.round(semitones) + 69;
  const note = CHROMATIC[((midi % 12) + 12) % 12];
  const octave = Math.floor(midi / 12) - 1;
  const idealFreq = referenceA4 * Math.pow(2, (midi - 69) / 12);
  const cents = 1200 * Math.log2(freq / idealFreq);
  return { note, octave, cents, idealFreq };
}

function updateTunerDisplay(freq) {
  const { note, octave, cents, idealFreq } = freqToNote(freq);
  document.getElementById('noteName').textContent = note;
  document.getElementById('noteOctave').textContent = octave;
  document.getElementById('freqDisplay').textContent = freq.toFixed(1) + ' Hz';
  const centsRounded = Math.round(cents);
  document.getElementById('centsDisplay').textContent = (centsRounded > 0 ? '+' : '') + centsRounded + ' ¢';

  highlightChromatic(note);
  setNeedle(cents);
  setMeter(cents);

  const inTune = Math.abs(cents) < 5;
  const badge = document.getElementById('inTuneBadge');
  badge.classList.toggle('visible', inTune);

  if (inTune) {
    document.getElementById('centsDisplay').style.color = 'var(--green)';
    document.getElementById('noteName').style.color = 'var(--green)';
  } else if (Math.abs(cents) < 20) {
    document.getElementById('centsDisplay').style.color = 'var(--yellow)';
    document.getElementById('noteName').style.color = 'var(--text)';
  } else {
    document.getElementById('centsDisplay').style.color = 'var(--red)';
    document.getElementById('noteName').style.color = 'var(--text)';
  }

  // Mark closest string
  const strings = INSTRUMENTS[currentInstrument].tunings[currentTuning];
  strings.forEach((s, i) => {
    const c = 1200 * Math.log2(freq / (s.freq * referenceA4 / 440));
    const card = document.getElementById('str-' + i);
    const stat = document.getElementById('strStatus-' + i);
    if (card && stat) {
      const close = Math.abs(c) < 15;
      card.classList.toggle('in-tune', close && Math.abs(c) < 5);
    }
  });
}

function setNeedle(cents) {
  const clamp = Math.max(-50, Math.min(50, cents));
  const deg = clamp * 1.8; // -90 to +90 degrees for ±50 cents
  document.getElementById('needle').setAttribute('transform', `rotate(${deg} 120 120)`);
}

function setMeter(cents) {
  const clamp = Math.max(-50, Math.min(50, cents));
  const pct = (clamp + 50) / 100 * 100;
  const fill = document.getElementById('meterFill');
  fill.style.left = pct + '%';
  const inTune = Math.abs(cents) < 5;
  const close = Math.abs(cents) < 20;
  fill.style.background = inTune ? 'var(--green)' : close ? 'var(--yellow)' : 'var(--red)';
}

function resetDisplay() {
  document.getElementById('noteName').textContent = '—';
  document.getElementById('noteName').style.color = 'var(--text)';
  document.getElementById('noteOctave').textContent = '';
  document.getElementById('freqDisplay').textContent = '— Hz';
  document.getElementById('centsDisplay').textContent = '— ¢';
  document.getElementById('centsDisplay').style.color = 'var(--muted)';
  document.getElementById('inTuneBadge').classList.remove('visible');
  setNeedle(0);
  setMeter(0);
  document.getElementById('volFill').style.width = '0%';
  highlightChromatic(null);
}

init();
</script>
